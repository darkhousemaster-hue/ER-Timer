<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ER Timer</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      user-select: none;
      cursor: pointer;
      -webkit-app-region: no-drag;
    }
    #btn {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      background: rgba(20, 20, 28, 0.55);
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.45),
                  inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      transition: transform 0.08s ease, background 0.15s ease;
    }
    #btn:hover {
      background: rgba(40, 40, 55, 0.75);
      transform: scale(1.04);
    }
    #btn:active {
      transform: scale(0.96);
    }
    #icon {
      width: 72px;
      height: 72px;
      pointer-events: none;
      -webkit-user-drag: none;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));
    }
  </style>
</head>
<body>
  <div id="btn" title="ER Timer — click to restore">
    <img id="icon" src="../../assets/icons/icon.png" alt="ER Timer">
  </div>
  <script>
    document.getElementById('btn').addEventListener('click', () => {
      window.api.send('restore-control')
    })
  </script>
</body>
</html>
